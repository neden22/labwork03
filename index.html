<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="todo-container">

    <div class="header">
      <h1>📝 Список завдань</h1>
    </div>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Введіть нове завдання">
      <button id="addBtn">Додати</button>
    </div>

    <ul id="taskList">

      <li class="completed">
        <div class="left">
          <button class="check-btn">✔</button>
          <span>Опанувати HTML та CSS</span>
        </div>
        <button class="delete-btn">✖</button>
      </li>

      <li>
        <div class="left">
          <button class="check-btn"></button>
          <span>Опанувати Git та GitHub</span>
        </div>
        <button class="delete-btn">✖</button>
      </li>

      <li>
        <div class="left">
          <button class="check-btn"></button>
          <span>Опанувати JavaScript</span>
        </div>
        <button class="delete-btn">✖</button>
      </li>

      <li>
        <div class="left">
          <button class="check-btn"></button>
          <span>Опанувати Node.js</span>
        </div>
        <button class="delete-btn">✖</button>
      </li>

    </ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
