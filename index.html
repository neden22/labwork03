<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Лабораторна робота 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">

    <section class="password-section">
      <h1>Генератор паролів</h1>

      <div class="generator">
        <div class="password">
          <input type="text" id="password" readonly>
          <button id="copyBtn">КОПІЯ</button>
        </div>

        <div class="range">
          <input type="range" id="length" min="4" max="24" value="14">
          <span id="lengthValue">14</span>
        </div>

        <div class="options">
          <label><input type="checkbox" id="lowercase" checked> аз</label>
          <label><input type="checkbox" id="uppercase" checked> AZ</label>
          <label><input type="checkbox" id="digits" checked> 0-9</label>
          <label><input type="checkbox" id="symbols" checked> !@$#%^</label>
        </div>

        <button class="generate" id="generateBtn">ГЕНЕРУВАТИ</button>
      </div>
    </section>

    <section class="todo-section">
      <div class="todo-container">
        <h1>📝 Список завдань</h1>

        <div class="task-input">
          <input type="text" id="taskInput" placeholder="Введіть нове завдання">
          <button id="addTaskBtn">Додати</button>
        </div>

        <div id="taskList" class="task-list">
          <div class="task done">
            <span class="circle">✓</span>
            <span class="task-text">Опнувати HTML та CSS</span>
            <button class="delete-btn">×</button>
          </div>

          <div class="task">
            <span class="circle"></span>
            <span class="task-text">Опнувати Git та GitHub</span>
            <button class="delete-btn">×</button>
          </div>

          <div class="task">
            <span class="circle"></span>
            <span class="task-text">Опнувати JavaScript</span>
            <button class="delete-btn">×</button>
          </div>

          <div class="task">
            <span class="circle"></span>
            <span class="task-text">Опнувати Node.js</span>
            <button class="delete-btn">×</button>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
